!
hostname CE2
ip cef
mpls label protocol ldp
interface Loopback0
 ip address 10.30.1.1 255.255.255.0
!
interface FastEthernet0/0
 ip address 10.255.255.10 255.255.255.252
 negotiation auto
 no shutdown
!
router bgp 333
 bgp router-id 333.0.0.1
 bgp log-neighbor-changes
 neighbor 10.255.255.9 remote-as 111
 !
 address-family ipv4
  network 10.30.1.0 mask 255.255.255.0
  neighbor 10.255.255.9 activate
  neighbor 10.255.255.9 allowas-in
 exit-address-family
end