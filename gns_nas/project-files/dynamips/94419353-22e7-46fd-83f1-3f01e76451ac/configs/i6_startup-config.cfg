!
hostname CE1
ip cef
interface Loopback0
 ip address 10.20.1.1 255.255.255.0
!
interface FastEthernet0/0
 ip address 10.255.255.2 255.255.255.252
 negotiation auto
 no shutdown
!
router bgp 222
 bgp router-id 222.0.0.1
 bgp log-neighbor-changes
 neighbor 10.255.255.1 remote-as 111
 !
 address-family ipv4
  network 10.20.1.0 mask 255.255.255.0
  neighbor 10.255.255.1 activate
  neighbor 10.255.255.1 allowas-in
 exit-address-family
end