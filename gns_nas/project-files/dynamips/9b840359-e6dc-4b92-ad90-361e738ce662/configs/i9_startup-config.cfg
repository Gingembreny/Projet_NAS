!
hostname CE4
ip cef
mpls label protocol ldp
interface Loopback0
 ip address 10.30.2.1 255.255.255.0
!
interface FastEthernet0/0
 ip address 10.255.255.14 255.255.255.252
 negotiation auto
 no shutdown
!
router bgp 333
 bgp router-id 333.0.0.2
 bgp log-neighbor-changes
 neighbor 10.255.255.13 remote-as 111
 !
 address-family ipv4
  network 10.30.2.0 mask 255.255.255.0
  neighbor 10.255.255.13 activate
  neighbor 10.255.255.13 allowas-in
 exit-address-family
end