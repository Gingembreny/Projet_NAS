!
hostname PE2
ip cef
mpls label protocol ldp
ip vrf CUST_222
 rd 111:1
 route-target export 111:1
 route-target import 111:1
!
ip vrf CUST_333
 rd 111:2
 route-target export 111:2
 route-target import 111:2
!
interface Loopback0
 ip address 10.10.10.5 255.255.255.255
!
interface GigabitEthernet2/0
 ip vrf forwarding CUST_222
 ip address 10.255.255.5 255.255.255.252
 negotiation auto
 no shutdown
!
interface GigabitEthernet3/0
 ip vrf forwarding CUST_333
 ip address 10.255.255.13 255.255.255.252
 negotiation auto
 no shutdown
!
interface GigabitEthernet1/0
 ip address 10.10.1.18 255.255.255.252
 negotiation auto
 mpls ip
 no shutdown
!
interface FastEthernet0/0
 ip address 10.10.1.14 255.255.255.252
 negotiation auto
 no shutdown
!
router ospf 111
 router-id 111.0.0.5
 network 10.10.0.0 0.0.255.255 area 0
!
router bgp 111
 bgp router-id 111.0.0.5
 bgp log-neighbor-changes
 neighbor 10.10.10.3 remote-as 111
 neighbor 10.10.10.3 update-source Loopback0
 !
 address-family vpnv4
  neighbor 10.10.10.3 activate
  neighbor 10.10.10.3 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf CUST_222
  neighbor 10.255.255.6 remote-as 222
  neighbor 10.255.255.6 activate
  neighbor 10.255.255.6 send-community both
 exit-address-family
 !
 address-family ipv4 vrf CUST_333
  neighbor 10.255.255.14 remote-as 333
  neighbor 10.255.255.14 activate
  neighbor 10.255.255.14 send-community both
 exit-address-family
end