hostname CE3
ip cef
interface Loopback0
 ip address 10.20.2.1 255.255.255.0
!
interface FastEthernet0/0
 ip address 10.255.255.6 255.255.255.252
 negotiation auto
 no shutdown
!
router bgp 222
 bgp router-id 222.0.0.2
 bgp log-neighbor-changes
 neighbor 10.255.255.5 remote-as 111
 !
 address-family ipv4
  network 10.20.2.0 mask 255.255.255.0
  neighbor 10.255.255.5 activate
  neighbor 10.255.255.5 allowas-in
 exit-address-family
end